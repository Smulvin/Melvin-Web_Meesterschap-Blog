<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/global.css">
    <link rel="stylesheet" href="../Styles/DS.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>

<body>
    <main>
        <div class="DS-controller">
            <div id="top-section">
                <div class="face front">
                    <div id="holes-container">
                        <ul class="sound-holes">
                            <li></li>
                            <li></li>
                        </ul>
                        <ul class="sound-holes">
                            <li></li>
                            <li></li>
                        </ul>
                    </div>

                    <div id="top-screen"></div>

                    <ul id="screw-covers">
                        <li></li>
                        <li></li>
                        <li></li>
                        <li></li>
                    </ul>
                    <div class="microphone"></div>
                </div>
                <div class="face back">
                    <ul>
                        <li></li>
                        <li></li>
                    </ul>
                </div>

            </div>

            <div id="middle-section">
                <div class="light-container">
                    <div class="light"></div>
                    <div class="light"></div>
                </div>
            </div>

            <div id="bottom-section">
                <div class="dpad">
                    <button id="dpad-up">
                        <hr>
                    </button>
                    <button id="dpad-left">
                        <hr>
                    </button>
                    <div></div>
                    <button id="dpad-right">
                        <hr>
                    </button>
                    <button id="dpad-down">
                        <hr>
                    </button>
                </div>

                <div id="bottom-screen"></div>

                <div class="bottom-right">
                    <div class="abxy-container">
                        <button class="x-button">X</button>
                        <button class="y-button">Y</button>
                        <button class="a-button">A</button>
                        <button class="b-button">B</button>
                    </div>

                    <div class="start-select-container">
                        <div>
                            <button id="start-button"></button>
                            <p>Start</p>
                        </div>
                        <div>
                            <button id="select-button"></button>
                            <p>Select</p>
                        </div>
                    </div>
                </div>
            </div>

    </main>

</html>
