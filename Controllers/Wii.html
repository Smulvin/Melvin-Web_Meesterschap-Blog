<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/global.css">
    <link rel="stylesheet" href="../Styles/wii.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="wii-controller">
            <!-- Power Button -->
            <div class="power-button">
                <button>
                    <i class="fa-solid fa-power-off"></i>
                </button>
                <p>Power</p>
            </div>

            <!-- D-Pad -->
            <div class="dpad">
                <button id="top"></button>
                <button id="left"></button>
                <button id="right"></button>
                <button id="bottom"></button>
            </div>

            <!-- A button -->
            <button id="btn-A">A</button>

            <!-- Center buttons -->
            <div class="center-buttons">
                <button id="button-minus">-</button>
                <div>
                    <button id="home-button">
                        <i class="fa-solid fa-house"></i>
                    </button>
                </div>
                <button id="button-plus">+</button>
            </div>

            <!-- Sound holes -->
            <div class="sound-holes">
                <div class="hole-small"></div>
                <div class="hole-medium"></div>
                <div class="hole-big"></div>
                <div class="hole-big"></div>
                <div class="hole-medium"></div>
                <div class="hole-small"></div>
            </div>

            <!-- 1 2 buttons -->
            <div class="btn-1-2">
                <button id="btn-1">1</button>
                <button id="btn-2">2</button>
            </div>

            <!-- player lights -->
            <div class="player-lights">
                <div id="player-light"></div>
                <div></div>
                <div></div>
                <div></div>
            </div>

            <!-- Wii Text -->
            <p class="wii-text">Wii</p>

        </div>
    </main>
    <footer>
        <a href="index.html">NES Controller</a>
        <!-- <a href="Controllers/SNES.html">SNES Controller</a> -->
        <!-- <a href="Controllers/GameCube.html">GameCube Controller</a> -->
        <a href="Controllers/GameBoy.html">GameBoy</a>
        <!-- <a href="Controllers/Wii.html">Wii </a> -->
        <a href="Controllers/Switch.html">Switch</a>
        <a href="Controllers/Switch2.html">Switch 2</a>
    </footer>
</body>
</html>
