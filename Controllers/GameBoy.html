<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/global.css">
    <link rel="stylesheet" href="../Styles/gameboy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="gameboy-controller">
            <div class="on-off-container">
                <p class="off-on">&lt; off-on &gt;</p>
            </div>
            <div class="gameboy-screen-container">
                <p>Dot matrix with stereo sound</p>
                <div class="battery-container">
                    <div class="light"></div>
                    <p>Battery</p>
                </div>
                <div class="gameboy-screen"></div>
                <h1>Nintendo <span>Game Boy</span>tm</h1>
            </div>
            <div class="center-buttons-container">
                <div class="gameboy-dpad">
                    <button id="gameboy-dpad-up"><i class="fa-solid fa-caret-up"></i></button>
                    <button id="gameboy-dpad-left"><i class="fa-solid fa-caret-left"></i></button>
                    <div></div>
                    <button id="gameboy-dpad-right"><i class="fa-solid fa-caret-right"></i></button>
                    <button id="gameboy-dpad-down"><i class="fa-solid fa-caret-down"></i></button>
                </div>
                <div class="a-b-container">
                    <div>
                        <button id="gameboy-b"></button>
                        <p>B</p>
                    </div>
                    <div>
                        <button id="gameboy-a"></button>
                        <p>A</p>
                    </div>
                </div>
            </div>
            
            <div class="select-start-container">
                <div class="select-container">
                    <button id="gameboy-select"></button>
                    <p>Select</p>
                </div>
                <div class="start-container">
                    <button id="gameboy-start"></button>
                    <p>Start</p>
                </div>
                
            </div>
            <ul class="sound-holes">
                <li class="hole"></li>
                <li class="hole"></li>
                <li class="hole"></li>
                <li class="hole"></li>
                <li class="hole"></li>
                <li class="hole"></li>
            </ul>
            <p class="headphones"><i class="fa-solid fa-headphones"></i>phone</p>
        </div>

    </main>

        <a href="../index.html">NES Controller</a>

        <a href="Switch2.html">Switch 2</a>
    </footer>
</body>
