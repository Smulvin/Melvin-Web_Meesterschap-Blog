<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Styles/global.css">
    <link rel="stylesheet" href="../Styles/switch.css">
    <link rel="stylesheet" href="../Styles/switch-general.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <main>
        <div class="switch-controller">
            <div class="switch-left">
                <button id="btn-l"></button>
                <button id="btn-minus"></button>
                <div class="joystick">
                    <div class="stick"></div>
                </div>
                <div class="btn-container">
                    <button id="btn-up"><i class="fa-solid fa-caret-up"></i></button>
                    <button id="btn-left"><i class="fa-solid fa-caret-left"></i></button>
                    <button id="btn-right"><i class="fa-solid fa-caret-right"></i></button>
                    <button id="btn-down"><i class="fa-solid fa-caret-down"></i></button>
                </div>
                <button id="btn-screenshot"></button>
            </div>

            <div class="switch-screen">
                <div class="content"></div>
            </div>

            <div class="switch-right">
                <button id="btn-r"></button>
                <button id="btn-plus"></button>
                <div class="btn-container">
                    <button id="btn-x">X</button>
                    <button id="btn-y">Y</button>
                    <button id="btn-a">A</button>
                    <button id="btn-b">B</button>
                </div>
                <div class="joystick">
                    <div class="stick"></div>
                </div>
                <button id="btn-home"><i class="fa-solid fa-house"></i></button>
            </div>

        </div>
    </main>
    <footer>
        <a href="../index.html">NES Controller</a>
        <a href="../Controllers/SNES.html">SNES Controller</a>
        <a href="../Controllers/GameCube.html">GameCube Controller</a>
        <a href="../Controllers/N64.html">N64 Controller</a>
        <a href="../Controllers/Wii.html">Wii Controller</a>
        <a href="../Controllers/Switch.html">Switch Controller</a>
        <a href="../Controllers/Switch2.html">Switch 2 Controller</a>
    </footer>
    
    <script src="../Scripts/switch-joystick.js"></script>
</body>
</html>
