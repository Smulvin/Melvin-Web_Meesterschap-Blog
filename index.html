<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles/nes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Document</title>
</head>

<body>
    <main>
        <div id="scene">
            <div id="nes-controller">
                <div id="nes-front">
                    <div id="nes-controller-black">
                        <div id="nes-left-half">
                            <div id="nes-dpad">
                                <!-- Icons: https://fontawesome.com/search?q=arrow&ic=free-collection -->
                                <button id="nes-dpad-up"><i class="fa-solid fa-caret-up"></i></button>
                                <button id="nes-dpad-left"><i class="fa-solid fa-caret-left"></i></button>
                                <div></div>
                                <button id="nes-dpad-right"><i class="fa-solid fa-caret-right"></i></button>
                                <button id="nes-dpad-down"><i class="fa-solid fa-caret-down"></i></button>
                            </div>
                        </div>

                        <div id="nes-grey-blocks">
                            <div></div>
                            <div></div>
                            <div></div><!--  Start / select teksten -->
                            <div>
                                <button id="nes-controller-select"></button>
                                <button id="nes-controller-start"></button>
                            </div>
                            <div></div>
                        </div>
                        <div id="nes-right-half">
                            <p>Nintendo&#169</p>
                            <div id="nes-ab-container">
                                <div>
                                    <button id="nes-controller-b"></button>
                                </div>
                                <div>
                                    <button id="nes-controller-a"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="nes-left"><hr></div>
                <div id="nes-right"><hr></div>
                <div id="nes-top"><hr></div>
                <div id="nes-bottom"><hr></div>
                <div id="nes-back">

                </div>
            </div>
        </div>
    </main>

    <script src="Scripts/nes-3D.js"></script>
</body>

</html>
